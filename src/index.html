<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Song Request</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="player-area">
        <div id="player-video-section">
          <div id="player-container">
            <div id="player"></div>
          </div>
          <div id="resize-handle"></div>
          <div id="progress-area">
            <span id="time-current">0:00</span>
            <input type="range" id="seek-bar" min="0" max="100" value="0" />
            <span id="time-total">0:00</span>
          </div>
        </div>
        <div id="player-controls">
          <button id="btn-prev" title="Previous">⏮</button>
          <button id="btn-play-pause" title="Play/Pause">⏸</button>
          <button id="btn-skip" title="Skip">⏭</button>
          <div class="spacer"></div>
          <div class="volume-control">
            <span class="vol-icon">🔊</span>
            <input type="range" id="volume-slider" min="0" max="100" value="50" />
          </div>
          <select id="quality-select" title="Quality">
            <option value="default">Auto</option>
            <option value="small">144p</option>
            <option value="medium">360p</option>
            <option value="large">480p</option>
            <option value="hd720">720p</option>
            <option value="hd1080">1080p</option>
          </select>
          <div class="spacer"></div>
          <button id="btn-hide-player" title="Hide player">👁</button>
        </div>
        <div id="now-playing">
          <span id="now-playing-text">No song playing</span>
        </div>
      </div>

      <div id="queue-area">
        <div id="queue-header">
          <h2 id="queue-title">Queue</h2>
          <div id="queue-header-actions">
            <span id="queue-count">0 songs</span>
            <button id="btn-open-add">+</button>
          </div>
        </div>
        <div id="queue-empty">
          <p>Queue is empty. Songs requested via donations will appear here.</p>
        </div>
        <ul id="queue-list"></ul>
      </div>
    </div>

    <div id="toast-container"></div>

    <div id="modal-overlay" class="hidden">
      <div id="modal">
        <div id="modal-header">
          <span id="modal-title">Add song</span>
          <button id="modal-close">✕</button>
        </div>
        <div id="modal-body">
          <div id="add-input-group">
            <input type="text" id="add-input" placeholder="Paste YouTube URL..." />
            <div id="add-spinner" class="hidden"></div>
            <button id="btn-add">Add</button>
          </div>
          <div id="add-result" class="hidden">
            <div id="modal-video-info">
              <img id="modal-thumb" src="" alt="" />
              <div id="modal-video-details">
                <strong id="modal-video-title"></strong>
                <span id="modal-video-meta"></span>
              </div>
            </div>
            <div id="modal-errors"></div>
          </div>
        </div>
        <div id="modal-footer" class="hidden">
          <button id="modal-cancel">Cancel</button>
          <button id="modal-add-anyway">Add anyway</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
